<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7db7ff">
  <title>城职灵导 CityNav AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell" aria-label="城职灵导 CityNav AI 校园导览">
    <section class="hero-panel" aria-label="校园首页头图">
      <div class="hero-user">
        <span class="hero-avatar" aria-hidden="true"></span>
        <div class="hero-copy">
          <p class="hero-kicker">CityNav AI</p>
          <strong id="heroRouteHint">从校门口前往活动中心</strong>
        </div>
      </div>

      <div class="hero-art" aria-hidden="true">
        <svg viewBox="0 0 390 220" role="presentation">
          <defs>
            <linearGradient id="heroSky" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7fb7ff"></stop>
              <stop offset="100%" stop-color="#dff2ff"></stop>
            </linearGradient>
            <linearGradient id="heroWater" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#dff8ff"></stop>
              <stop offset="100%" stop-color="#9be6ff"></stop>
            </linearGradient>
            <linearGradient id="heroPath" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ecfbff"></stop>
              <stop offset="100%" stop-color="#c4eff8"></stop>
            </linearGradient>
          </defs>

          <rect width="390" height="220" rx="28" fill="url(#heroSky)"></rect>
          <g opacity="0.95">
            <ellipse cx="42" cy="68" rx="34" ry="16" fill="#f4fbff"></ellipse>
            <ellipse cx="76" cy="76" rx="24" ry="12" fill="#f4fbff"></ellipse>
            <ellipse cx="332" cy="44" rx="26" ry="12" fill="#f6fcff"></ellipse>
            <ellipse cx="356" cy="50" rx="18" ry="9" fill="#f6fcff"></ellipse>
          </g>

          <g opacity="0.2" fill="#93afda">
            <rect x="252" y="66" width="16" height="50" rx="4"></rect>
            <rect x="274" y="74" width="18" height="42" rx="4"></rect>
            <rect x="298" y="58" width="22" height="58" rx="5"></rect>
            <rect x="328" y="70" width="18" height="46" rx="4"></rect>
          </g>

          <g transform="translate(38 92)">
            <rect x="0" y="30" width="82" height="42" rx="6" fill="#eff8ff" stroke="#91bff2"></rect>
            <path d="M-4 34 L41 2 L86 34 Z" fill="#90c4ff"></path>
            <path d="M8 30 L41 10 L74 30 Z" fill="#5ea0eb"></path>
            <rect x="18" y="42" width="12" height="30" fill="#d3edff"></rect>
            <rect x="35" y="42" width="12" height="30" fill="#d3edff"></rect>
            <rect x="52" y="42" width="12" height="30" fill="#d3edff"></rect>
          </g>

          <g transform="translate(138 58)">
            <path d="M61 10 L103 32 L95 37 L61 21 L27 37 L19 32 Z" fill="#5298e6"></path>
            <path d="M61 0 L118 28 L108 34 L61 14 L14 34 L4 28 Z" fill="#8bc2ff"></path>
            <rect x="18" y="30" width="86" height="66" rx="8" fill="#f9fdff" stroke="#8dbcf0"></rect>
            <rect x="38" y="46" width="16" height="18" fill="#cae7ff"></rect>
            <rect x="67" y="46" width="16" height="18" fill="#cae7ff"></rect>
            <rect x="49" y="65" width="22" height="31" rx="11" fill="#d7f1ff" stroke="#8dbcf0"></rect>
            <rect x="8" y="44" width="16" height="52" rx="5" fill="#f3fbff" stroke="#8dbcf0"></rect>
            <rect x="98" y="44" width="16" height="52" rx="5" fill="#f3fbff" stroke="#8dbcf0"></rect>
            <path d="M16 44 L16 28 L31 18 L31 44 Z" fill="#75b5f3"></path>
            <path d="M106 44 L106 28 L91 18 L91 44 Z" fill="#75b5f3"></path>
          </g>

          <path d="M0 162 C88 146 112 150 194 154 C255 157 310 151 390 130 L390 220 L0 220 Z" fill="url(#heroWater)" opacity="0.98"></path>
          <path d="M146 160 C178 146 212 146 248 156 C228 165 197 171 164 170 Z" fill="#f4ffff" opacity="0.85"></path>

          <g fill="#8ecf8e">
            <circle cx="32" cy="140" r="10"></circle>
            <circle cx="46" cy="136" r="13"></circle>
            <circle cx="346" cy="130" r="12"></circle>
            <circle cx="360" cy="136" r="15"></circle>
            <circle cx="306" cy="146" r="13"></circle>
          </g>
          <g fill="#7ab26e">
            <rect x="43" y="146" width="4" height="18" rx="2"></rect>
            <rect x="357" y="148" width="4" height="18" rx="2"></rect>
            <rect x="305" y="156" width="4" height="16" rx="2"></rect>
          </g>

          <path d="M120 184 C152 174 204 173 257 183" fill="none" stroke="url(#heroPath)" stroke-width="8" stroke-linecap="round"></path>
        </svg>
      </div>
    </section>

    <section class="floating-card search-card" aria-labelledby="searchTitle">
      <div class="search-wrap">
        <button class="search-icon-btn" id="searchBtn" type="button" aria-label="搜索目的地">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16 L21 21"></path>
          </svg>
        </button>
        <label class="search-input-wrap" for="searchInput">
          <span class="sr-only" id="searchTitle">搜索校园地点</span>
          <input id="searchInput" type="search" list="locationSuggestions" autocomplete="off" placeholder="搜索楼宇、服务与目的地">
        </label>
        <datalist id="locationSuggestions"></datalist>
      </div>

      <div class="feature-grid" aria-label="快捷目的地">
        <button class="quick-btn quick-btn-blue" type="button" data-to="teaching">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 20 V9 L12 5 L20 9 V20"></path>
            <path d="M9 20 V13 H15 V20"></path>
            <path d="M8 10 H10 M14 10 H16"></path>
          </svg>
          <span>教学楼</span>
        </button>
        <button class="quick-btn quick-btn-green" type="button" data-to="training">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10 L12 5 L21 10"></path>
            <path d="M5 10 V16 L12 19 L19 16 V10"></path>
          </svg>
          <span>实训楼</span>
        </button>
        <button class="quick-btn quick-btn-orange" type="button" data-to="canteen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 4 V12"></path>
            <path d="M9 4 V12"></path>
            <path d="M6 8 H9"></path>
            <path d="M14 4 V12"></path>
            <path d="M18 4 V20"></path>
          </svg>
          <span>食堂</span>
        </button>
        <button class="quick-btn quick-btn-violet" type="button" data-to="library">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6.5 C8.5 5 11 5 13 6.5 V18 C11 16.7 8.5 16.7 5 18 Z"></path>
            <path d="M19 6.5 C15.5 5 13 5 11 6.5 V18 C13 16.7 15.5 16.7 19 18 Z"></path>
          </svg>
          <span>图书馆</span>
        </button>
      </div>
      <p class="notice" id="routeNotice" role="status" aria-live="polite"></p>
    </section>

    <section class="floating-card itinerary-card" id="routeResultSection" aria-labelledby="routeTitle">
      <div class="card-top">
        <div>
          <p class="section-label">今日路线</p>
          <h1 id="routeTitle">活动中心校园动线</h1>
        </div>
        <div class="metric-pills">
          <span class="metric-pill" id="routeTime">约 8 分钟</span>
          <span class="metric-pill metric-pill-soft" id="routeDistance">510 米</span>
        </div>
      </div>

      <p class="route-copy" id="routeText"></p>

      <div class="itinerary-grid">
        <ol class="route-steps" id="routeSteps"></ol>

        <aside class="destination-preview">
          <div class="mini-scene" aria-hidden="true">
            <span class="scene-haze"></span>
            <span class="scene-road"></span>
            <span class="scene-pin"></span>
            <span class="scene-house"></span>
            <span class="scene-tree scene-tree-left"></span>
            <span class="scene-tree scene-tree-right"></span>
          </div>
          <div class="destination-meta">
            <span class="destination-type" id="destinationType">活动服务</span>
            <strong id="destinationName">活动中心</strong>
            <p id="destinationScene">活动报名、现场咨询、参赛签到</p>
          </div>
        </aside>
      </div>

      <div class="destination-copy">
        <p class="route-landmarks" id="routeLandmarks"></p>
        <p id="destinationDescription"></p>
        <p class="destination-tips" id="destinationTips"></p>
      </div>
    </section>

    <section class="floating-card map-card" aria-labelledby="mapTitle">
      <div class="card-top map-top">
        <div>
          <p class="section-label">校园动态地图</p>
          <h2 id="mapTitle">路线预览</h2>
        </div>
        <span class="map-state" id="mapState">校门口到活动中心</span>
      </div>

      <div class="map-stage">
        <div class="map-wrap">
          <svg class="campus-map" id="campusMap" viewBox="0 0 100 100" role="img" aria-label="校园路线地图">
            <defs>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#17475c" flood-opacity="0.18"></feDropShadow>
              </filter>
              <linearGradient id="routeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6"></stop>
                <stop offset="55%" stop-color="#14b8a6"></stop>
                <stop offset="100%" stop-color="#f97316"></stop>
              </linearGradient>
              <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#caf2ff"></stop>
                <stop offset="100%" stop-color="#7fd8ff"></stop>
              </linearGradient>
            </defs>

            <rect width="100" height="100" rx="8" fill="#eef9ff"></rect>
            <path d="M4 77 C18 67 31 76 45 64 S69 42 96 50 L96 99 L4 99 Z" fill="#d8f7de"></path>
            <path d="M6 10 C23 5 37 10 50 14 S76 20 95 12 L95 32 C77 39 55 31 34 36 C20 39 10 35 6 31 Z" fill="#def2ff"></path>
            <path d="M74 67 C81 61 93 64 96 72 C99 80 91 88 79 84 C71 82 69 73 74 67 Z" fill="url(#waterGradient)" opacity="0.88"></path>
            <path d="M13 57 C23 52 29 56 33 63" fill="none" stroke="#c5f0d0" stroke-width="4" stroke-linecap="round"></path>
            <path d="M71 22 C77 26 80 30 82 37" fill="none" stroke="#cae7ff" stroke-width="3.4" stroke-linecap="round"></path>

            <path class="map-road" d="M50 91 L50 78 L47 70 L45 62 L50 49 L55 25"></path>
            <path class="map-road" d="M45 62 C54 58 62 54 72 50"></path>
            <path class="map-road" d="M45 62 C36 55 31 48 24 42"></path>
            <path class="map-road" d="M72 50 C74 41 77 32 82 25"></path>
            <path class="map-road" d="M55 25 C65 24 74 24 82 25"></path>
            <path class="map-road" d="M24 42 C35 38 46 31 55 25"></path>
            <polyline id="routeHighlight" class="route-highlight" points=""></polyline>

            <g class="place" data-location-id="library" tabindex="0" role="button" aria-label="选择图书馆" transform="translate(55 25)">
              <rect x="-8" y="-7" width="16" height="13" rx="2.2" fill="#ffffff" filter="url(#softShadow)"></rect>
              <path d="M-6 5 L-6 -4 L-2 -6 L2 -4 L6 -6 L6 5" fill="#dbeafe" stroke="#2563eb" stroke-width="0.9"></path>
              <path d="M-2 -6 L-2 5 M2 -4 L2 5" stroke="#2563eb" stroke-width="0.7"></path>
              <text x="0" y="13">图书馆</text>
            </g>

            <g class="place" data-location-id="event" tabindex="0" role="button" aria-label="选择活动中心" transform="translate(82 25)">
              <rect x="-8" y="-7" width="16" height="13" rx="2.2" fill="#fff7ed" filter="url(#softShadow)"></rect>
              <path d="M-5 3 L0 -5 L5 3 Z" fill="#fbbf24" stroke="#b45309" stroke-width="0.9"></path>
              <circle cx="0" cy="-1" r="1.6" fill="#ffffff"></circle>
              <text x="0" y="13">活动中心</text>
            </g>

            <g class="place" data-location-id="training" tabindex="0" role="button" aria-label="选择实训楼" transform="translate(24 42)">
              <rect x="-8" y="-7" width="16" height="13" rx="2.2" fill="#ffffff" filter="url(#softShadow)"></rect>
              <path d="M-5 4 L-5 -3 L0 -6 L5 -3 L5 4 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="0.9"></path>
              <path d="M-2 4 L-2 -1 L2 -1 L2 4" fill="#bbf7d0" stroke="#16a34a" stroke-width="0.7"></path>
              <text x="0" y="13">实训楼</text>
            </g>

            <g class="place" data-location-id="canteen" tabindex="0" role="button" aria-label="选择食堂" transform="translate(72 50)">
              <rect x="-8" y="-7" width="16" height="13" rx="2.2" fill="#fff7ed" filter="url(#softShadow)"></rect>
              <path d="M-4 -5 L-4 4 M0 -5 L0 4 M4 -5 L4 4" stroke="#ea580c" stroke-width="1.1" stroke-linecap="round"></path>
              <path d="M-5 -1 L5 -1" stroke="#ea580c" stroke-width="1.1" stroke-linecap="round"></path>
              <text x="0" y="13">食堂</text>
            </g>

            <g class="place" data-location-id="teaching" tabindex="0" role="button" aria-label="选择教学楼" transform="translate(45 62)">
              <rect x="-9" y="-8" width="18" height="14" rx="2.2" fill="#ffffff" filter="url(#softShadow)"></rect>
              <path d="M-6 5 L-6 -5 L6 -5 L6 5 Z" fill="#e0e7ff" stroke="#4f46e5" stroke-width="0.9"></path>
              <path d="M-3 -2 H-1 M2 -2 H4 M-3 1 H-1 M2 1 H4" stroke="#4f46e5" stroke-width="0.8" stroke-linecap="round"></path>
              <text x="0" y="14">教学楼</text>
            </g>

            <g class="place" data-location-id="gate" tabindex="0" role="button" aria-label="选择校门口" transform="translate(50 91)">
              <rect x="-9" y="-7" width="18" height="12" rx="2.2" fill="#ffffff" filter="url(#softShadow)"></rect>
              <path d="M-6 4 L-6 -2 L-3 -5 L3 -5 L6 -2 L6 4 M-2 4 L-2 -1 L2 -1 L2 4" fill="#ecfeff" stroke="#0891b2" stroke-width="0.9"></path>
              <text x="0" y="13">校门口</text>
            </g>

            <g id="routeMarkers"></g>
          </svg>
        </div>

        <div class="map-fabs" aria-hidden="true">
          <button class="fab-btn fab-btn-primary" type="button">
            <svg viewBox="0 0 24 24">
              <path d="M6 12 L10 16 L18 8"></path>
            </svg>
          </button>
          <button class="fab-btn" type="button">
            <svg viewBox="0 0 24 24">
              <path d="M12 3 V6 M12 18 V21 M3 12 H6 M18 12 H21"></path>
              <circle cx="12" cy="12" r="3.5"></circle>
            </svg>
          </button>
          <button class="fab-btn" type="button">
            <svg viewBox="0 0 24 24">
              <path d="M12 4 L20 8 L12 20 L9 13 L4 11 Z"></path>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section class="voice-dock" aria-labelledby="voiceTitle">
      <button class="voice-btn voice-btn-primary" id="playSpeechBtn" type="button" aria-label="播放语音导览">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 9.5 V14.5"></path>
          <path d="M12 6.5 V17.5"></path>
          <path d="M16 9.5 V14.5"></path>
        </svg>
      </button>
      <div class="voice-body">
        <p class="section-label" id="voiceTitle">AI 语音导览</p>
        <strong id="compassDirection">东北方向</strong>
        <p id="compassHint">沿中央主路前行后向东侧支路切入，按地图高亮路线前往活动中心。</p>
        <p class="speech-status" id="speechStatus" role="status" aria-live="polite">点击语音条可播放路线讲解。</p>
      </div>
      <button class="voice-btn voice-btn-ghost" id="stopSpeechBtn" type="button" aria-label="停止语音导览">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="7" y="7" width="10" height="10" rx="2"></rect>
        </svg>
      </button>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="bottom-tab is-active" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 11 L12 5 L20 11 V19 H15 V14 H9 V19 H4 Z"></path>
        </svg>
        <span>首页</span>
      </button>
      <button class="bottom-tab" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 6 H10 V18 H5 Z"></path>
          <path d="M14 5 L19 7 V19 L14 17 Z"></path>
        </svg>
        <span>路线</span>
      </button>
      <button class="bottom-tab" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5 L14.2 9.4 L19 10.1 L15.5 13.4 L16.3 18.1 L12 15.8 L7.7 18.1 L8.5 13.4 L5 10.1 L9.8 9.4 Z"></path>
        </svg>
        <span>收藏</span>
      </button>
      <button class="bottom-tab" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19 C6.8 15.8 9 14.5 12 14.5 C15 14.5 17.2 15.8 19 19"></path>
        </svg>
        <span>我的</span>
      </button>
    </nav>

    <form class="sr-only" id="routeForm" aria-hidden="true">
      <label for="fromSelect">起点</label>
      <select id="fromSelect" name="from"></select>
      <label for="toSelect">终点</label>
      <select id="toSelect" name="to"></select>
      <button id="generateRouteBtn" type="submit">生成路线</button>
      <button id="swapRouteBtn" type="button">交换路线</button>
    </form>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
